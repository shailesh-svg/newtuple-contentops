name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Test Python agent
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for secret scanning

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: agent/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r agent/requirements-dev.txt

      - name: Check syntax
        run: |
          python - <<'PY'
          import ast
          from pathlib import Path
          paths = [p for p in Path("agent").rglob("*.py") if ".venv" not in p.parts]
          for path in paths:
              ast.parse(path.read_text(encoding="utf-8"), filename=str(path))
          print(f"parsed={len(paths)}")
          PY

      - name: Lint
        run: ruff check agent

      - name: Run tests
        run: pytest --cov=agent --cov-report=term-missing

      - name: Content quality-gate self-test
        # Guards the guardrail: prove the gate still blocks a known-bad draft and
        # passes a known-good one. A regression that silently weakens the gate
        # fails the build here, independently of the unit tests.
        working-directory: agent
        run: |
          python - <<'PY'
          from quality_gate import evaluate_draft
          good = (
              "Treating a demo as production is the mistake. Reliability, "
              "monitoring, and clear workflow ownership decide whether an "
              "enterprise rollout survives real users. Start this week: audit "
              "one workflow and define who owns each handoff before you ship."
          )
          bad = good + " This is a total game changer."
          assert evaluate_draft(good, bucket="Workflow Wins", voice_score=9)["passed"], "good draft should pass"
          assert not evaluate_draft(bad, bucket="Workflow Wins", voice_score=9)["passed"], "banned phrase must block"
          assert not evaluate_draft(good, bucket="", voice_score=9)["passed"], "missing bucket must block"
          print("quality gate self-test OK")
          PY

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
