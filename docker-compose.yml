# Local development compose file.
# Copy agent/.env.example → agent/.env and fill in credentials before running.
#
#   docker compose up                  # agent only (uses OpenAI / Claude API)
#   docker compose --profile ollama up # agent + local Ollama

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - agent/.env
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    profiles:
      - ollama

volumes:
  ollama-data:
